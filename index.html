<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;1,600&family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

.pl-app{
  --bg:#17261f;
  --surface:#1f3129;
  --surface-2:#294034;
  --border:#3c5346;
  --text:#f5f9f5;
  --text-dim:#aec6b7;
  --text-faint:#82998b;
  --zone1:#4a7f86;
  --zone2:#47a184;
  --zone3:#5cb35c;
  --zone4:#bb9a48;
  --zone5:#d4b02e;
  --move:#d4b02e;
  --exercise:#57b077;
  --stand:#a3e6c2;
  --danger:#c66249;
  --on-accent:#0a1a10;
  --radius-lg:26px;
  --radius-md:16px;
  --radius-sm:10px;
  --f-serif:'Fraunces',serif;
  --f-display:'Space Grotesk',sans-serif;
  --f-body:'Inter',sans-serif;
  --f-mono:'JetBrains Mono',monospace;
  font-family:var(--f-body);
  background:#0d140f;
  min-height:100vh;
  display:flex;
  justify-content:center;
  padding:32px 16px;
  box-sizing:border-box;
  color:var(--text);
}
.pl-app *{box-sizing:border-box;}
.pl-phone{
  width:100%;max-width:410px;background:var(--bg);border-radius:var(--radius-lg);
  border:1px solid #1a1a20;overflow:hidden;display:flex;flex-direction:column;
  min-height:800px;position:relative;box-shadow:0 40px 80px rgba(0,0,0,0.5);
}
.pl-storage-banner{background:rgba(181,83,63,0.15);color:var(--danger);font-size:11px;
  line-height:1.5;padding:9px 14px;margin:0 22px 6px;border-radius:12px;font-family:var(--f-mono);}
.pl-topbar{padding:22px 22px 10px;}
.pl-brand{font-family:var(--f-serif);font-style:italic;font-weight:700;font-size:24px;letter-spacing:-0.01em;color:var(--stand);}
.pl-tagline{font-family:var(--f-mono);font-size:11px;color:var(--text-dim);margin-top:2px;}
.pl-screens{flex:1;overflow-y:auto;padding:4px 22px 110px;}
.pl-screen{display:none;}
.pl-screen.pl-active{display:block;animation:plFade .25s ease;}
@keyframes plFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.pl-tabbar{
  position:absolute;bottom:0;left:0;right:0;display:flex;
  background:rgba(19,19,24,0.94);backdrop-filter:blur(10px);
  border-top:1px solid var(--border);padding:10px 8px 14px;
}
.pl-tab{flex:1;background:none;border:none;color:var(--text-faint);display:flex;
  flex-direction:column;align-items:center;gap:4px;font-family:var(--f-body);
  font-size:11px;padding:6px 0;cursor:pointer;transition:color .15s ease;}
.pl-tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;}
.pl-tab.pl-tab-active{color:var(--exercise);}
.pl-h{font-family:var(--f-serif);font-style:italic;font-weight:600;font-size:15px;margin:22px 0 12px;
  color:var(--text-dim);letter-spacing:0.01em;}
.pl-weekstrip{display:flex;justify-content:space-between;margin:18px 0 22px;}
.pl-day{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
.pl-day-label{font-size:10px;color:var(--text-faint);font-family:var(--f-mono);}
.pl-day-dot{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-dim);
  font-family:var(--f-mono);}
.pl-day-dot.pl-has{background:var(--exercise);border-color:var(--exercise);color:var(--on-accent);font-weight:700;}
.pl-day-dot.pl-today{box-shadow:0 0 0 2px var(--move);}
.pl-ring-wrap{position:relative;display:flex;justify-content:center;margin:8px 0 20px;}
.pl-ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.pl-ring-center .pl-big{font-family:var(--f-display);font-weight:700;font-size:32px;}
.pl-ring-center .pl-sub{font-family:var(--f-mono);font-size:11px;color:var(--text-dim);margin-top:2px;}
.pl-cardrow{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
.pl-statcard{flex:0 0 136px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-md);padding:14px;}
.pl-statcard .pl-label{font-size:11px;color:var(--text-dim);}
.pl-statcard .pl-value{font-family:var(--f-display);font-weight:700;font-size:21px;margin-top:6px;}
.pl-statcard .pl-delta{font-family:var(--f-mono);font-size:10px;margin-top:5px;color:var(--text-faint);}
.pl-delta.pl-up{color:var(--danger);}
.pl-delta.pl-down{color:var(--stand);}
.pl-empty{text-align:center;padding:44px 10px;color:var(--text-dim);font-size:13px;line-height:1.6;}
.pl-empty .pl-empty-title{font-family:var(--f-serif);font-style:italic;font-weight:700;font-size:18px;
  color:var(--text);margin-bottom:8px;}
.pl-seed-btn{padding:10px 18px;border-radius:14px;border:1px solid var(--border);
  background:var(--surface-2);color:var(--stand);font-size:12px;cursor:pointer;font-family:var(--f-body);}
.pl-cta{width:100%;padding:15px;border-radius:18px;border:none;background:var(--exercise);
  color:var(--on-accent);font-weight:600;font-family:var(--f-body);font-size:15px;cursor:pointer;
  margin-top:6px;margin-bottom:20px;}
.pl-cta:active{transform:scale(0.98);}
.pl-field{margin-bottom:16px;}
.pl-field label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;}
.pl-field input[type=text],.pl-field input[type=number],.pl-field input[type=date],.pl-field textarea{
  width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:11px 13px;color:var(--text);font-family:var(--f-mono);font-size:14px;}
.pl-field textarea{font-family:var(--f-body);resize:vertical;min-height:60px;}
.pl-duration-display{font-family:var(--f-mono);font-size:13px;color:var(--exercise);
  margin:-6px 0 16px;font-weight:500;}
.pl-datequick{display:flex;gap:6px;margin-top:8px;}
.pl-datequick button{padding:6px 12px;border-radius:14px;border:1px solid var(--border);
  background:var(--surface);color:var(--text-dim);font-size:12px;cursor:pointer;font-family:var(--f-body);}
.pl-datequick button:active{background:var(--surface-2);}
.pl-chiprow{display:flex;gap:8px;flex-wrap:wrap;}
.pl-chip{padding:9px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);
  color:var(--text-dim);font-size:13px;cursor:pointer;}
.pl-chip.pl-sel{background:var(--exercise);color:var(--on-accent);border-color:var(--exercise);font-weight:600;}
.pl-zonegrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pl-zonefield{display:flex;align-items:center;gap:8px;background:var(--surface);
  border:1px solid var(--border);border-radius:12px;padding:8px 10px;}
.pl-zoneswatch{width:12px;height:12px;border-radius:4px;flex-shrink:0;}
.pl-zonefield input{border:none;background:none;width:100%;color:var(--text);
  font-family:var(--f-mono);font-size:13px;padding:0;outline:none;}
.pl-zonebar{display:flex;height:10px;border-radius:6px;overflow:hidden;margin:12px 0 4px;
  background:var(--surface-2);}
.pl-zonebar span{height:100%;}
.pl-zonehint{font-size:11px;color:var(--text-faint);font-family:var(--f-mono);}
.pl-zonehint.pl-warn{color:var(--danger);}
.pl-range-row{display:flex;align-items:center;gap:12px;}
.pl-app input[type=range]{flex:1;accent-color:var(--exercise);}
.pl-range-val{font-family:var(--f-mono);font-weight:600;min-width:22px;text-align:center;}
.pl-photobox{margin-bottom:16px;}
.pl-photobtn{width:100%;padding:16px;border:1.5px dashed var(--border);border-radius:14px;
  background:var(--surface);color:var(--text-dim);font-family:var(--f-body);font-size:13px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.pl-photobtn svg{width:18px;height:18px;stroke:var(--exercise);fill:none;stroke-width:1.7;flex-shrink:0;}
.pl-photo-thumbs{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.pl-photo-thumbs img{width:48px;height:48px;object-fit:cover;border-radius:8px;border:1px solid var(--border);}
.pl-photo-status{font-size:12px;margin-top:8px;font-family:var(--f-mono);color:var(--text-faint);min-height:14px;}
.pl-photo-status.pl-photo-loading{color:var(--stand);}
.pl-photo-status.pl-photo-success{color:var(--exercise);}
.pl-photo-status.pl-photo-error{color:var(--danger);}
.pl-error{color:var(--danger);font-size:12px;margin-top:2px;margin-bottom:14px;display:none;}
.pl-error.pl-show{display:block;}
.pl-hist-item{display:flex;align-items:center;gap:12px;background:var(--surface);
  border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:10px;cursor:pointer;}
.pl-hist-icon{width:38px;height:38px;border-radius:10px;background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pl-hist-main{flex:1;min-width:0;}
.pl-hist-date{font-family:var(--f-mono);font-size:11px;color:var(--text-dim);}
.pl-hist-type{font-size:14px;font-weight:500;margin-top:1px;}
.pl-hist-right{text-align:right;}
.pl-hist-dur{font-family:var(--f-display);font-weight:700;font-size:15px;}
.pl-hist-hr{font-family:var(--f-mono);font-size:11px;color:var(--stand);margin-top:2px;}
.pl-overlay{position:absolute;inset:0;background:var(--bg);z-index:20;display:none;
  flex-direction:column;padding:22px;overflow-y:auto;}
.pl-overlay.pl-show{display:flex;}
.pl-overlay-close{align-self:flex-end;background:var(--surface);border:1px solid var(--border);
  color:var(--text);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;cursor:pointer;margin-bottom:6px;font-size:18px;line-height:1;}
.pl-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;}
.pl-detail-cell{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;}
.pl-detail-cell .pl-label{font-size:11px;color:var(--text-dim);}
.pl-detail-cell .pl-value{font-family:var(--f-display);font-weight:700;font-size:18px;margin-top:4px;}
.pl-memo-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:12px;margin-top:14px;font-size:13px;color:var(--text-dim);white-space:pre-wrap;}
.pl-delete-btn{width:100%;padding:13px;border-radius:14px;border:1px solid var(--danger);
  background:none;color:var(--danger);font-weight:600;margin-top:10px;cursor:pointer;font-family:var(--f-body);font-size:14px;}
.pl-toggle{display:flex;background:var(--surface);border-radius:14px;padding:4px;margin:6px 0 18px;}
.pl-toggle button{flex:1;padding:9px;border:none;background:none;color:var(--text-dim);
  border-radius:10px;font-size:13px;cursor:pointer;font-family:var(--f-body);}
.pl-toggle button.pl-sel{background:var(--surface-2);color:var(--text);font-weight:600;}
.pl-summarygrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.pl-sumcell{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;}
.pl-sumcell .pl-label{font-size:11px;color:var(--text-dim);}
.pl-sumcell .pl-value{font-family:var(--f-display);font-weight:700;font-size:19px;margin-top:6px;}
.pl-heat-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.pl-heat-cell{aspect-ratio:1;border-radius:6px;background:var(--surface);display:flex;
  align-items:center;justify-content:center;font-size:9px;color:var(--text-faint);font-family:var(--f-mono);}
.pl-heat-cell.pl-out{opacity:0.2;}
.pl-heat-legend{display:flex;align-items:center;gap:6px;margin-top:12px;font-size:10px;
  color:var(--text-faint);font-family:var(--f-mono);}
.pl-legend-box{width:10px;height:10px;border-radius:3px;}
.pl-weekbars{display:flex;align-items:flex-end;gap:8px;height:140px;margin-bottom:6px;}
.pl-weekbar-col{flex:1;display:flex;flex-direction:column-reverse;border-radius:6px;
  overflow:hidden;background:var(--surface-2);}
.pl-weekbar-col span{width:100%;}
.pl-weekbars-labels{display:flex;gap:8px;margin-bottom:20px;}
.pl-weekbars-labels span{flex:1;text-align:center;font-size:10px;color:var(--text-faint);font-family:var(--f-mono);}
.pl-trendrow{margin-bottom:10px;}
.pl-trend-label{font-size:11px;color:var(--text-dim);font-family:var(--f-mono);
  margin-bottom:4px;display:flex;justify-content:space-between;}
.pl-trendbar{display:flex;height:14px;border-radius:6px;overflow:hidden;background:var(--surface-2);}
.pl-trendbar span{height:100%;}
.pl-toast{position:absolute;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:10px 18px;
  border-radius:20px;font-size:13px;opacity:0;pointer-events:none;transition:all .25s ease;z-index:30;
  white-space:nowrap;}
.pl-toast.pl-show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>

<div class="pl-app">
  <div class="pl-phone">
    <div class="pl-topbar">
      <div class="pl-brand">박동일지</div>
      <div class="pl-tagline">심박수로 보는 나의 운동</div>
    </div>
    <div id="pl-storage-banner" class="pl-storage-banner" style="display:none;">
      클라우드 저장소에 연결할 수 없어요. 인터넷 연결을 확인해주세요. 기록이 새로고침 후 사라질 수 있어요.
    </div>

    <div id="pl-sync-gate" class="pl-overlay pl-show" style="z-index:40;">
      <div style="margin-top:60px;text-align:center;">
        <div class="pl-brand" style="justify-content:center;display:flex;font-size:26px;margin-bottom:8px;">박동일지</div>
        <div style="color:var(--text-dim);font-size:13px;margin-bottom:32px;">
          컴퓨터와 폰에서 같은 기록을 보려면<br>동기화 코드를 하나 정해서 양쪽에 똑같이 입력해주세요.
        </div>
        <div class="pl-field" style="text-align:left;">
          <label>동기화 코드</label>
          <input type="text" id="pl-sync-input" placeholder="예: bakdong7" style="text-transform:lowercase;">
        </div>
        <button type="button" class="pl-cta" onclick="plStartWithCode()">이 코드로 시작하기</button>
        <button type="button" class="pl-seed-btn" style="width:100%;margin-top:4px;" onclick="plGenerateCode()">코드 새로 만들기(처음 쓰는 경우)</button>
        <div id="pl-sync-error" class="pl-error" style="text-align:center;margin-top:14px;"></div>
      </div>
    </div>

    <div class="pl-screens">

      <section id="scr-home" class="pl-screen pl-active">
        <div class="pl-h" style="margin-top:6px;">이번 주</div>
        <div class="pl-weekstrip" id="pl-weekstrip"></div>
        <div id="pl-hero-wrap"></div>
        <div class="pl-h">트렌드</div>
        <div class="pl-cardrow" id="pl-cardrow"></div>
        <button class="pl-cta" onclick="plGoTab('add')">+ 기록 추가</button>
      </section>

      <section id="scr-add" class="pl-screen">
        <div class="pl-h" style="margin-top:6px;">운동 종류</div>
        <div class="pl-chiprow" id="pl-type-chips"></div>

        <div class="pl-h">사진으로 자동 입력</div>
        <div class="pl-photobox">
          <input type="file" id="f-photos" accept="image/*" multiple style="display:none" onchange="plHandlePhotoUpload(event)">
          <button type="button" class="pl-photobtn" onclick="document.getElementById('f-photos').click()">
            <svg viewBox="0 0 24 24"><path d="M4 8h3l2-3h6l2 3h3v11H4z"/><circle cx="12" cy="13" r="3.3"/></svg>
            워치 화면 사진 올리기 (여러 장 가능)
          </button>
          <div id="pl-photo-thumbs" class="pl-photo-thumbs"></div>
          <div id="pl-photo-status" class="pl-photo-status"></div>
        </div>

        <div class="pl-h">기본 정보</div>
        <div class="pl-field"><label>날짜</label><input type="date" id="f-date">
          <div class="pl-datequick">
            <button type="button" onclick="plQuickDate(0)">오늘</button>
            <button type="button" onclick="plQuickDate(1)">어제</button>
            <button type="button" onclick="plQuickDate(2)">그제</button>
          </div>
        </div>
        <div class="pl-field" style="display:flex;gap:10px;">
          <div style="flex:1;"><label>시작 시간</label>
            <input type="time" step="1" id="f-start" oninput="plComputeDuration()"></div>
          <div style="flex:1;"><label>종료 시간</label>
            <input type="time" step="1" id="f-end" oninput="plComputeDuration()"></div>
        </div>
        <div class="pl-duration-display" id="pl-duration-display">시작/종료 시간을 입력해주세요</div>
        <input type="hidden" id="f-duration" value="">
        <div class="pl-field" style="display:flex;gap:10px;">
          <div style="flex:1;"><label>평균 심박수</label><input type="number" id="f-avghr" placeholder="예: 102"></div>
          <div style="flex:1;"><label>최고 심박수</label><input type="number" id="f-maxhr" placeholder="예: 118"></div>
        </div>
        <div class="pl-field" style="display:flex;gap:10px;">
          <div style="flex:1;"><label>활동 칼로리</label><input type="number" id="f-kcalact" placeholder="예: 118"></div>
          <div style="flex:1;"><label>총 칼로리</label><input type="number" id="f-kcaltotal" placeholder="예: 167"></div>
        </div>

        <div class="pl-h">심박존 시간 (분)</div>
        <div class="pl-zonegrid" id="pl-zone-inputs"></div>
        <div class="pl-zonebar" id="pl-zone-preview"></div>
        <div class="pl-zonehint" id="pl-zone-hint">운동 시간과 심박존 합계를 맞춰주면 더 정확해요.</div>

        <div class="pl-h">체감 강도 (RPE)</div>
        <div class="pl-range-row">
          <input type="range" min="1" max="10" value="5" id="f-rpe" oninput="plUpdateRpe()">
          <span class="pl-range-val" id="pl-rpe-val">5</span>
        </div>

        <div class="pl-h">메모</div>
        <div class="pl-field"><textarea id="f-memo" placeholder="컨디션, 특이사항을 적어보세요"></textarea></div>

        <div class="pl-error" id="pl-form-error">운동 종류, 날짜, 시작/종료 시간은 꼭 입력해주세요.</div>
        <button class="pl-cta" onclick="plSaveWorkout()">저장하기</button>
      </section>

      <section id="scr-history" class="pl-screen">
        <div class="pl-h" style="margin-top:6px;">전체 기록</div>
        <div id="pl-history-list"></div>
      </section>

      <section id="scr-stats" class="pl-screen">
        <div class="pl-toggle">
          <button class="pl-sel" data-period="week" onclick="plSetPeriod('week')">최근 7일</button>
          <button data-period="month" onclick="plSetPeriod('month')">이번 달</button>
        </div>
        <div class="pl-summarygrid" id="pl-summary-grid"></div>
        <div id="pl-stats-chart-area"></div>
        <div class="pl-h">최근 운동 심박존 비교</div>
        <div id="pl-trend-rows"></div>
      </section>

    </div>

    <nav class="pl-tabbar">
      <button class="pl-tab pl-tab-active" data-tab="home" onclick="plGoTab('home')">
        <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h5v-6h4v6h5V10"/></svg>
        <span>홈</span>
      </button>
      <button class="pl-tab" data-tab="add" onclick="plGoTab('add')">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>기록</span>
      </button>
      <button class="pl-tab" data-tab="history" onclick="plGoTab('history')">
        <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="8" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.2"/><circle cx="4" cy="12" r="1.2"/><circle cx="4" cy="18" r="1.2"/></svg>
        <span>히스토리</span>
      </button>
      <button class="pl-tab" data-tab="stats" onclick="plGoTab('stats')">

async function plSeedWeek(){
  const today = new Date();
  const memos = ['컨디션 좋았음', '', '', '다리가 조금 무거웠음', '', '', '가볍게 마무리'];
  const sample = [];
  for(let i=6;i>=0;i--){
    const d = new Date(today); d.setDate(today.getDate()-i);
    const dayIndex = 6-i;
    const isWalkDay = (i===3);
    const type = isWalkDay ? '걷기' : '실내자전거';
    const duration = isWalkDay ? +(20+Math.random()*5).toFixed(1) : +(26+Math.random()*14).toFixed(1);
    const avgHr = isWalkDay ? (92+Math.round(Math.random()*6)) : Math.round(112 - dayIndex*1.8 + (Math.random()*4-2));
    const maxHr = avgHr + Math.round(10+Math.random()*8);
    const kcalActive = Math.round(duration*(isWalkDay?2.2:3.2));
    const kcalTotal = kcalActive + Math.round(20+Math.random()*15);
    let zones;
    if(isWalkDay){
      zones = [+(duration*0.6).toFixed(1), +(duration*0.4).toFixed(1), 0, 0, 0];
    } else {
      const z1 = +(duration*0.15).toFixed(1);
      const z2 = +(duration*0.35).toFixed(1);
      const z3 = +(duration*0.30).toFixed(1);
      const z4 = +(duration*0.13).toFixed(1);
      const z5 = +Math.max(0, duration-(z1+z2+z3+z4)).toFixed(1);
      zones = [z1,z2,z3,z4,z5];
    }
    const startHour = 7 + (Math.random()<0.3?1:0);
    const startMinute = Math.floor(Math.random()*30);
    const start = new Date(d); start.setHours(startHour, startMinute, 0, 0);
    const end = new Date(start.getTime()+duration*60000);
    sample.push({
      id: plUid(),
      date: plToISO(d),
      type: type,
      startTime: plToHHMMSS(start),
      endTime: plToHHMMSS(end),
      duration: duration,
      avgHr: avgHr,
      maxHr: maxHr,
      kcalActive: kcalActive,
      kcalTotal: kcalTotal,
      zones: zones,
      rpe: isWalkDay ? 3 : (5+Math.round(Math.random()*2)),
      memo: memos[dayIndex] || ''
    });
  }
  PL_WORKOUTS = PL_WORKOUTS.concat(sample);
  const ok = await plPersist();
  plToast(ok ? '일주일치 예시 기록을 채웠어요' : '저장 실패 - 이 화면을 벗어나면 사라질 수 있어요');
  plRenderHome();
  plRenderHistory();
  plRenderStats();
}

let PL_STORAGE_OK = true;
let PL_SYNC_CODE = null;

function plNormalizeCode(raw){
  return (raw||'').trim().toLowerCase().replace(/[^a-z0-9]/g,'');
}

function plGenerateCode(){
  const chars = 'abcdefghjkmnpqrstuvwxyz23456789';
  let code = '';
  for(let i=0;i<8;i++){ code += chars[Math.floor(Math.random()*chars.length)]; }
  document.getElementById('pl-sync-input').value = code;
  document.getElementById('pl-sync-error').classList.remove('pl-show');
  document.getElementById('pl-sync-error').textContent = '이 코드를 꼭 기억하거나 메모해두세요. 다른 기기에서 같은 코드를 입력하면 기록이 이어집니다.';
  document.getElementById('pl-sync-error').classList.add('pl-show');
}

async function plStartWithCode(){
  const code = plNormalizeCode(document.getElementById('pl-sync-input').value);
  const errEl = document.getElementById('pl-sync-error');
  if(!code || code.length<4){
    errEl.textContent = '코드는 4자 이상의 영문/숫자로 입력해주세요.';
    errEl.classList.add('pl-show');
    return;
  }
  errEl.classList.remove('pl-show');
  PL_SYNC_CODE = code;
  try{ localStorage.setItem('pl-sync-code', code); }catch(e){}
  document.getElementById('pl-sync-gate').classList.remove('pl-show');
  await plLoad();
}

async function plCheckStorage(){
  const banner = document.getElementById('pl-storage-banner');
  try{
    await plDb.collection('logs').doc('__ping__').set({ t: Date.now() }, { merge: true });
    PL_STORAGE_OK = true;
  }catch(e){
    PL_STORAGE_OK = false;
  }
  banner.style.display = PL_STORAGE_OK ? 'none' : 'block';
}

async function plLoad(){
  await plCheckStorage();
  try{
    const doc = await plDb.collection('logs').doc(PL_SYNC_CODE).get();
    PL_WORKOUTS = (doc.exists && doc.data().workoutsJson) ? JSON.parse(doc.data().workoutsJson) : [];
  }catch(e){
    console.error('load failed', e);
    PL_WORKOUTS = [];
  }
  plRenderHome();
  plRenderHistory();
  plRenderStats();
}

async function plPersist(){
  try{
    await plDb.collection('logs').doc(PL_SYNC_CODE).set({
      workoutsJson: JSON.stringify(PL_WORKOUTS),
      updatedAt: Date.now()
    }, { merge: true });
    return true;
  }catch(e){
    console.error('storage failed', e);
    return false;
  }
}

function plUpdateZonePreview(){

  const bar = document.getElementById('pl-zone-preview');
  const dur = parseFloat(document.getElementById('f-duration').value) || 0;
  if(total<=0){
    bar.innerHTML = '';
  } else {
    bar.innerHTML = zones.map(function(v,i){
      if(v<=0) return '';
      const pct = (v/total*100).toFixed(2);
      return '<span style="width:'+pct+'%;background:'+PL_ZONE_HEX[i]+'"></span>';
    }).join('');
  }
  const hint = document.getElementById('pl-zone-hint');
  if(dur>0 && total>0 && Math.abs(total-dur)>1){
    hint.textContent = '심박존 합계('+total.toFixed(1)+'분)가 운동 시간('+dur.toFixed(1)+'분)과 '+Math.abs(total-dur).toFixed(1)+'분 차이나요.';

  } else {
    hint.textContent = '운동 시간과 심박존 합계를 맞춰주면 더 정확해요.';

function plParseTimeToMinutes(str){
  if(!str) return null;
  const parts = str.split(':').map(Number);
  const h = parts[0]||0, m = parts[1]||0, s = parts[2]||0;
  return h*60+m+s/60;
}

function plToHHMMSS(d){
  return plPad(d.getHours())+':'+plPad(d.getMinutes())+':'+plPad(d.getSeconds());
}

function plComputeDuration(){
  const sVal = document.getElementById('f-start').value;
  const eVal = document.getElementById('f-end').value;
  const disp = document.getElementById('pl-duration-display');
  const startMin = plParseTimeToMinutes(sVal);
  const endMin = plParseTimeToMinutes(eVal);
  const hidden = document.getElementById('f-duration');
  if(startMin==null || endMin==null){
    disp.textContent = '시작/종료 시간을 입력해주세요';
    hidden.value = '';
    plUpdateZonePreview();
    return null;
  }
  let diff = endMin-startMin;
  if(diff<0) diff += 1440;
  hidden.value = diff;
  disp.textContent = '운동 시간: '+diff.toFixed(1)+'분';
  plUpdateZonePreview();
  return diff;
}

function plFileToBase64(file){
  return new Promise(function(resolve, reject){
    const reader = new FileReader();
    reader.onload = function(){ resolve(reader.result.split(',')[1]); };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function plHandlePhotoUpload(event){
  const files = Array.prototype.slice.call(event.target.files || []);
  if(files.length===0) return;
  const status = document.getElementById('pl-photo-status');
  const thumbs = document.getElementById('pl-photo-thumbs');
  thumbs.innerHTML = files.map(function(f){ return '<img src="'+URL.createObjectURL(f)+'">'; }).join('');
  status.textContent = '사진 '+files.length+'장을 분석하고 있어요...';
  status.className = 'pl-photo-status pl-photo-loading';
  try{
    const contentBlocks = [];
    for(let i=0;i<files.length;i++){
      const b64 = await plFileToBase64(files[i]);
      const mediaType = files[i].type || 'image/jpeg';
      contentBlocks.push({ type:'image', source:{ type:'base64', media_type: mediaType, data: b64 } });
    }
    contentBlocks.push({
      type:'text',
      text:'다음은 애플워치 운동 요약 화면 스크린샷들이야. 같은 한 번의 운동 세션을 여러 화면(캡처)으로 나눠 찍은 것일 수 있어. 모든 이미지를 종합해서 아래 JSON 형식으로만 응답해. 다른 설명이나 코드블록 표시 없이 순수 JSON 객체 하나만 출력해.\n\n{"duration_min": 숫자 또는 null, "avg_hr": 숫자 또는 null, "max_hr": 숫자 또는 null, "kcal_active": 숫자 또는 null, "kcal_total": 숫자 또는 null, "zone1_min": 숫자, "zone2_min": 숫자, "zone3_min": 숫자, "zone4_min": 숫자, "zone5_min": 숫자}\n\n시간 표시(예: 34:48.00)는 분 단위 소수로 변환해줘(예: 34.8). 화면에 안 보이는 값은 null로, 심박존 값은 안 보이면 0으로 넣어줘.'
    });

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        messages:[{ role:'user', content: contentBlocks }]
      })
    });
    const data = await response.json();
    const textPart = (data.content||[]).map(function(c){ return c.text||''; }).join('');
    const clean = textPart.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);

    if(parsed.duration_min!=null){
      const endTime = new Date();
      const startTime = new Date(endTime.getTime() - parsed.duration_min*60000);
      document.getElementById('f-end').value = plToHHMMSS(endTime);
      document.getElementById('f-start').value = plToHHMMSS(startTime);
      plComputeDuration();
    }
    if(parsed.avg_hr!=null) document.getElementById('f-avghr').value = parsed.avg_hr;
    if(parsed.max_hr!=null) document.getElementById('f-maxhr').value = parsed.max_hr;
    if(parsed.kcal_active!=null) document.getElementById('f-kcalact').value = parsed.kcal_active;
    if(parsed.kcal_total!=null) document.getElementById('f-kcaltotal').value = parsed.kcal_total;
    document.getElementById('f-zone1').value = parsed.zone1_min || 0;
    document.getElementById('f-zone2').value = parsed.zone2_min || 0;
    document.getElementById('f-zone3').value = parsed.zone3_min || 0;
    document.getElementById('f-zone4').value = parsed.zone4_min || 0;
    document.getElementById('f-zone5').value = parsed.zone5_min || 0;
    plUpdateZonePreview();

    status.textContent = '자동으로 채웠어요. 시작/종료 시간은 추정값이니 확인 후 저장해주세요.';
    status.className = 'pl-photo-status pl-photo-success';
  }catch(e){
    console.error('photo analysis failed', e);
    status.textContent = '사진 분석에 실패했어요. 값을 직접 입력해주세요.';
    status.className = 'pl-photo-status pl-photo-error';
  }
  event.target.value = '';
}

  const date = document.getElementById('f-date').value;

function plToast(msg){

function plRingSVG(zones, size){
  const total = zones.reduce(function(a,b){ return a+b; },0);
  const cx=100, cy=100;
  const radii = [90,74,58,42,26];
  const strokeW = 12;
  let circles = '';
  for(let i=0;i<5;i++){
    const r = radii[i];
    const circumference = 2*Math.PI*r;
    const frac = total>0 ? zones[i]/total : 0;
    const dash = circumference*frac;
    circles += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+PL_ZONE_HEX[i]+'" stroke-opacity="0.15" stroke-width="'+strokeW+'"/>';
    circles += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+PL_ZONE_HEX[i]+'" stroke-width="'+strokeW+'" stroke-linecap="round" stroke-dasharray="'+dash+' '+circumference+'" transform="rotate(-90 '+cx+' '+cy+')"/>';
  }
  return '<svg viewBox="0 0 200 200" width="'+size+'" height="'+size+'">'+circles+'</svg>';
}

function plRenderWeekStrip(){
  const wrap = document.getElementById('pl-weekstrip');
  const labels = ['일','월','화','수','목','금','토'];
  const today = new Date();
  let html = '';
  for(let i=6;i>=0;i--){
    const d = new Date(today);
    d.setDate(today.getDate()-i);
    const iso = plToISO(d);
    const has = PL_WORKOUTS.some(function(w){ return w.date===iso; });
    const isToday = iso===plToISO(today);
    html += '<div class="pl-day" onclick="plOpenDayDetail(\''+iso+'\')"><span class="pl-day-label">'+labels[d.getDay()]+'</span>'+
      '<span class="pl-day-dot '+(has?'pl-has':'')+' '+(isToday?'pl-today':'')+'">'+d.getDate()+'</span></div>';
  }
  wrap.innerHTML = html;
}

function plOpenDayDetail(iso){
  const dayWorkouts = PL_WORKOUTS.filter(function(w){ return w.date===iso; });
  if(dayWorkouts.length===0){
    plToast('이 날은 기록이 없어요');
    return;
  }
  if(dayWorkouts.length===1){
    plOpenDetail(dayWorkouts[0].id);
  } else {
    plGoTab('history');
    plToast(iso+'에 기록 '+dayWorkouts.length+'개가 있어요');
  }
}

function plLatestWorkout(){
  if(PL_WORKOUTS.length===0) return null;
  const sorted = PL_WORKOUTS.slice().sort(function(a,b){
    return (b.date.localeCompare(a.date)) || (b.id.localeCompare(a.id));
  });
  return sorted[0];
}

function plRenderCards(){
  const wrap = document.getElementById('pl-cardrow');
  const sorted = PL_WORKOUTS.slice().sort(function(a,b){ return a.date.localeCompare(b.date); });
  const last3 = sorted.slice(-3).map(function(w){ return w.avgHr; }).filter(Boolean);
  const prev3 = sorted.slice(-6,-3).map(function(w){ return w.avgHr; }).filter(Boolean);
  const avgLast = plAvg(last3);
  const avgPrev = plAvg(prev3);
  const delta = (avgPrev && avgLast) ? Math.round(avgLast-avgPrev) : null;

  const today = new Date();
  const weekStart = new Date(today); weekStart.setDate(today.getDate()-6);
  const weekTotal = PL_WORKOUTS.filter(function(w){ return plFromISO(w.date)>=weekStart; })
    .reduce(function(a,w){ return a+w.duration; },0);

  const thisMonth = today.getMonth(), thisYear = today.getFullYear();
  const monthCount = PL_WORKOUTS.filter(function(w){
    const d = plFromISO(w.date);
    return d.getMonth()===thisMonth && d.getFullYear()===thisYear;
  }).length;

  let deltaHtml;
  if(delta!==null){
    deltaHtml = '<div class="pl-delta '+(delta<=0?'pl-down':'pl-up')+'">'+(delta<=0?'▼':'▲')+' '+Math.abs(delta)+'bpm 지난 회차 대비</div>';
  } else {
    deltaHtml = '<div class="pl-delta">기록이 더 쌓이면 표시돼요</div>';
  }

  wrap.innerHTML =
    '<div class="pl-statcard"><div class="pl-label">최근 평균 심박수</div>'+
    '<div class="pl-value">'+(avgLast?Math.round(avgLast):'--')+'<span style="font-size:12px;"> bpm</span></div>'+
    deltaHtml+'</div>'+
    '<div class="pl-statcard"><div class="pl-label">이번 주 총 시간</div>'+
    '<div class="pl-value">'+weekTotal.toFixed(0)+'<span style="font-size:12px;"> 분</span></div>'+
    '<div class="pl-delta">최근 7일 합산</div></div>'+
    '<div class="pl-statcard"><div class="pl-label">이번 달 운동 횟수</div>'+
    '<div class="pl-value">'+monthCount+'<span style="font-size:12px;"> 회</span></div>'+
    '<div class="pl-delta">꾸준함이 핵심이에요</div></div>';
}

function plRenderHome(){
  plRenderWeekStrip();
  plRenderHero();
  plRenderCards();
}

function plRenderHistory(){
  const wrap = document.getElementById('pl-history-list');
  if(PL_WORKOUTS.length===0){
    wrap.innerHTML = '<div class="pl-empty"><div class="pl-empty-title">기록이 없어요</div>운동을 마치면 바로 기록해보세요.</div>';
    return;
  }
  const sorted = PL_WORKOUTS.slice().sort(function(a,b){
    return (b.date.localeCompare(a.date)) || (b.id.localeCompare(a.id));
  });
  wrap.innerHTML = sorted.map(function(w){
    return '<div class="pl-hist-item" onclick="plOpenDetail(\''+w.id+'\')">'+
      '<div class="pl-hist-icon"><svg viewBox="0 0 24 24" stroke="var(--exercise)" fill="none" stroke-width="1.7"><path d="M12 21s-7-4.35-9.5-8.5C.5 8.5 3 5 6.5 5c2 0 3.2 1 5.5 3.2C14.3 6 15.5 5 17.5 5 21 5 23.5 8.5 21.5 12.5 19 16.65 12 21 12 21z"/></svg></div>'+
      '<div class="pl-hist-main"><div class="pl-hist-date">'+w.date+'</div><div class="pl-hist-type">'+w.type+'</div></div>'+
      '<div class="pl-hist-right"><div class="pl-hist-dur">'+w.duration.toFixed(1)+'분</div>'+
      '<div class="pl-hist-hr">'+(w.avgHr?Math.round(w.avgHr)+' bpm':'-')+'</div></div></div>';
  }).join('');
}

function plOpenDetail(id){
  const w = PL_WORKOUTS.find(function(x){ return x.id===id; });
  if(!w) return;
  const ring = plRingSVG(w.zones, 180);
  const zoneLabels = w.zones.map(function(v,i){ return v>0 ? ('영역'+(i+1)+' '+v.toFixed(1)+'분') : null; })
    .filter(Boolean).join(' · ');
  document.getElementById('pl-detail-content').innerHTML =
    '<div class="pl-ring-wrap">'+ring+
    '<div class="pl-ring-center"><div class="pl-big" style="font-size:26px;">'+(w.avgHr?Math.round(w.avgHr):'--')+
    '<span style="font-size:12px;color:var(--text-dim);"> bpm</span></div><div class="pl-sub">'+w.duration.toFixed(1)+'분</div></div></div>'+
    '<div style="text-align:center;font-family:var(--f-mono);font-size:12px;color:var(--text-dim);margin-bottom:4px;">'+w.date+' · '+w.type+(w.startTime&&w.endTime?' · '+w.startTime.slice(0,5)+' ~ '+w.endTime.slice(0,5):'')+'</div>'+
    '<div style="text-align:center;font-size:11px;color:var(--text-faint);margin-bottom:6px;">'+(zoneLabels||'심박존 기록 없음')+'</div>'+
    '<div class="pl-detail-grid">'+
    '<div class="pl-detail-cell"><div class="pl-label">최고 심박수</div><div class="pl-value">'+(w.maxHr?Math.round(w.maxHr):'-')+'</div></div>'+
    '<div class="pl-detail-cell"><div class="pl-label">체감 강도</div><div class="pl-value">'+w.rpe+'/10</div></div>'+
    '<div class="pl-detail-cell"><div class="pl-label">활동 칼로리</div><div class="pl-value">'+(w.kcalActive?Math.round(w.kcalActive):'-')+'</div></div>'+
    '<div class="pl-detail-cell"><div class="pl-label">총 칼로리</div><div class="pl-value">'+(w.kcalTotal?Math.round(w.kcalTotal):'-')+'</div></div>'+
    '</div>'+
    (w.memo ? '<div class="pl-memo-box">'+w.memo+'</div>' : '')+
    '<div id="pl-delete-zone"></div>';
  plRenderDeleteButton(id);
  document.getElementById('pl-detail-overlay').classList.add('pl-show');
}

function plRenderDeleteButton(id){
  const zone = document.getElementById('pl-delete-zone');
  zone.innerHTML = '<button class="pl-delete-btn" onclick="plConfirmDelete(\''+id+'\')">이 기록 삭제하기</button>';
}

function plConfirmDelete(id){
  const zone = document.getElementById('pl-delete-zone');
  zone.innerHTML =
    '<div style="text-align:center;font-size:13px;color:var(--text-dim);margin-top:20px;margin-bottom:10px;">정말 삭제할까요? 되돌릴 수 없어요.</div>'+
    '<div style="display:flex;gap:10px;">'+
    '<button class="pl-delete-btn" style="flex:1;border-color:var(--border);color:var(--text-dim);" onclick="plRenderDeleteButton(\''+id+'\')">취소</button>'+
    '<button class="pl-delete-btn" style="flex:1;background:var(--danger);border-color:var(--danger);color:#fff;" onclick="plDeleteWorkout(\''+id+'\')">삭제</button>'+
    '</div>';
}

async function plDeleteWorkout(id){
  PL_WORKOUTS = PL_WORKOUTS.filter(function(w){ return w.id!==id; });
  const ok = await plPersist();
  plCloseDetail();
  plRenderHome();
  plRenderHistory();
  plRenderStats();
  plToast(ok ? '삭제했어요' : '삭제 실패 - 저장소에 연결되지 않았어요');
}

function plCloseDetail(){
  document.getElementById('pl-detail-overlay').classList.remove('pl-show');
}

function plSetPeriod(p){
  plCurrentPeriod = p;
  document.querySelectorAll('.pl-toggle button').forEach(function(b){
    b.classList.toggle('pl-sel', b.getAttribute('data-period')===p);
  });
  plRenderStats();
}

function plRenderStats(){
  const today = new Date();
  let filtered;
  if(plCurrentPeriod==='week'){
    const start = new Date(today); start.setDate(today.getDate()-6);
    filtered = PL_WORKOUTS.filter(function(w){ return plFromISO(w.date)>=start; });
  } else {
    filtered = PL_WORKOUTS.filter(function(w){
      const d = plFromISO(w.date);
      return d.getMonth()===today.getMonth() && d.getFullYear()===today.getFullYear();
    });
  }
  const totalDur = filtered.reduce(function(a,w){ return a+w.duration; },0);
  const totalKcal = filtered.reduce(function(a,w){ return a+(w.kcalTotal||0); },0);
  const avgHrList = filtered.map(function(w){ return w.avgHr; }).filter(Boolean);
  const avgHr = avgHrList.length ? Math.round(plAvg(avgHrList)) : 0;

  document.getElementById('pl-summary-grid').innerHTML =
    '<div class="pl-sumcell"><div class="pl-label">총 시간</div><div class="pl-value">'+totalDur.toFixed(0)+'분</div></div>'+
    '<div class="pl-sumcell"><div class="pl-label">총 칼로리</div><div class="pl-value">'+totalKcal.toFixed(0)+'kcal</div></div>'+
    '<div class="pl-sumcell"><div class="pl-label">평균 심박수</div><div class="pl-value">'+(avgHr||'-')+'bpm</div></div>'+
    '<div class="pl-sumcell"><div class="pl-label">운동 횟수</div><div class="pl-value">'+filtered.length+'회</div></div>';

  const chartArea = document.getElementById('pl-stats-chart-area');
  chartArea.innerHTML = plCurrentPeriod==='week' ? plRenderWeekBarsHTML() : plRenderHeatmapHTML();
  plRenderTrendRows();
}

function plRenderWeekBarsHTML(){
  const today = new Date();
  const days = [];
  for(let i=6;i>=0;i--){
    const d = new Date(today); d.setDate(today.getDate()-i);
    days.push(d);
  }
  const labels = ['일','월','화','수','목','금','토'];
  const dayTotals = days.map(function(d){
    const iso = plToISO(d);
    const ws = PL_WORKOUTS.filter(function(w){ return w.date===iso; });
    const zonesSum = [0,0,0,0,0];
    let dur = 0;
    ws.forEach(function(w){
      dur += w.duration;
      w.zones.forEach(function(z,i){ zonesSum[i]+=z; });
    });
    return { dur: dur, zonesSum: zonesSum };
  });
  const maxDur = Math.max(1, Math.max.apply(null, dayTotals.map(function(d){ return d.dur; })));
  const bars = dayTotals.map(function(d){
    const heightPct = (d.dur/maxDur*100);
    const total = d.zonesSum.reduce(function(a,b){ return a+b; },0);
    let segs = '';
    if(total>0){
      segs = d.zonesSum.map(function(z,i){
        return z>0 ? '<span style="height:'+(z/total*100)+'%;background:'+PL_ZONE_HEX[i]+'"></span>' : '';
      }).join('');
    } else if(d.dur>0){
      segs = '<span style="height:100%;background:var(--surface-2)"></span>';
    }
    return '<div class="pl-weekbar-col" style="height:'+Math.max(heightPct,3)+'%;">'+segs+'</div>';
  }).join('');
  const lbls = labels.map(function(l){ return '<span>'+l+'</span>'; }).join('');
  return '<div class="pl-weekbars">'+bars+'</div><div class="pl-weekbars-labels">'+lbls+'</div>';
}

function plRenderHeatmapHTML(){
  const today = new Date();
  const y = today.getFullYear(), m = today.getMonth();
  const firstDay = new Date(y,m,1);
  const daysInMonth = new Date(y,m+1,0).getDate();
  const startWeekday = firstDay.getDay();
  const dayDur = {};
  PL_WORKOUTS.forEach(function(w){
    const d = plFromISO(w.date);
    if(d.getFullYear()===y && d.getMonth()===m){
      dayDur[d.getDate()] = (dayDur[d.getDate()]||0)+w.duration;
    }
  });
  const vals = Object.keys(dayDur).map(function(k){ return dayDur[k]; });
  const maxDur = Math.max(1, vals.length ? Math.max.apply(null, vals) : 1);
  let cells = '';
  for(let i=0;i<startWeekday;i++){ cells += '<div class="pl-heat-cell pl-out"></div>'; }
  for(let day=1;day<=daysInMonth;day++){
    const dur = dayDur[day]||0;
    const alpha = dur>0 ? (0.25 + 0.75*(dur/maxDur)) : 0;
    const bg = dur>0 ? ('rgba(212,176,46,'+alpha.toFixed(2)+')') : 'var(--surface)';
    const color = (dur>0 && alpha>0.5) ? 'var(--on-accent)' : 'var(--text-faint)';
    const iso = plToISO(new Date(y,m,day));
    const clickAttr = dur>0 ? ' onclick="plOpenDayDetail(\''+iso+'\')" style="background:'+bg+';color:'+color+';cursor:pointer;"' : ' style="background:'+bg+';color:'+color+';"';
    cells += '<div class="pl-heat-cell"'+clickAttr+'>'+day+'</div>';
  }
  return '<div class="pl-heat-grid">'+cells+'</div>'+
    '<div class="pl-heat-legend"><span class="pl-legend-box" style="background:var(--surface)"></span>없음'+
    '<span class="pl-legend-box" style="background:rgba(212,176,46,0.5);margin-left:8px;"></span>보통'+
    '<span class="pl-legend-box" style="background:rgba(212,176,46,1);margin-left:8px;"></span>많이 탐</div>';
}

function plRenderTrendRows(){
  const wrap = document.getElementById('pl-trend-rows');
  const recent = PL_WORKOUTS.slice().sort(function(a,b){ return b.date.localeCompare(a.date); }).slice(0,6);
  if(recent.length===0){
    wrap.innerHTML = '<div class="pl-empty" style="padding:24px 10px;">아직 데이터가 없어요.</div>';
    return;
  }
  wrap.innerHTML = recent.map(function(w){
    const total = w.zones.reduce(function(a,b){ return a+b; },0);
    let segs;
    if(total>0){
      segs = w.zones.map(function(z,i){
        return z>0 ? '<span style="width:'+(z/total*100)+'%;background:'+PL_ZONE_HEX[i]+'"></span>' : '';
      }).join('');
    } else {
      segs = '<span style="width:100%;background:var(--surface-2)"></span>';
    }
    return '<div class="pl-trendrow"><div class="pl-trend-label"><span>'+w.date+'</span><span>'+w.duration.toFixed(1)+'분</span></div>'+
      '<div class="pl-trendbar">'+segs+'</div></div>';
  }).join('');
}

function plInit(){
  plBuildTypeChips();
  plBuildZoneInputs();
  document.getElementById('f-date').value = plToday();
  let savedCode = null;
  try{ savedCode = localStorage.getItem('pl-sync-code'); }catch(e){}
  if(savedCode){
    PL_SYNC_CODE = savedCode;
    document.getElementById('pl-sync-gate').classList.remove('pl-show');
    plLoad();
  }
}

plInit();
</script>
